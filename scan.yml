name: Science News Auto-Scan

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      max_items_per_source:
        description: 'Max items to fetch per RSS source'
        required: false
        default: '10'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 lxml

      - name: Run RSS & HTTP scraper
        env:
          MAX_ITEMS: ${{ github.event.inputs.max_items_per_source || '10' }}
        run: python rss_scanner.py

      - name: Commit updated news data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news_feed.json data/scan_log.json
          git diff --cached --quiet || git commit -m "chore: auto-scan science news [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
